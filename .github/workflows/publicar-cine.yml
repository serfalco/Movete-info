name: Publicar Cine

on:
  schedule:
    # Jueves 07:40 Argentina (10:40 UTC)
    - cron: "40 10 * * 4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publicar-movete
  cancel-in-progress: false

jobs:
  publicar-cine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Movete-info
        uses: actions/checkout@v4
        with:
          ref: main
          path: Movete-info

      - name: Checkout movete-cine
        uses: actions/checkout@v4
        with:
          repository: serfalco/movete-cine
          path: movete-cine

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias cine
        working-directory: movete-cine
        run: pip install -r requirements.txt

      - name: Generar Cine
        working-directory: movete-cine
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          MOVETE_CINE_OUT: ../Movete-info/cine
        run: python main.py

      - name: Commit cambios en Movete-info
        working-directory: Movete-info
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "Sin cambios para publicar" || git commit -m "Publicar edición semanal Cine"
          git push
