name: Publicar semanal

on:
  schedule:
    # Jueves 07:17 Argentina (10:17 UTC). GitHub puede demorar los cron.
    - cron: "17 10 * * 4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publicar-movete
  cancel-in-progress: false

jobs:
  publicar-semanal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Movete-info
        uses: actions/checkout@v4
        with:
          ref: main
          path: Movete-info

      - name: Checkout movete-scraper
        uses: actions/checkout@v4
        with:
          repository: serfalco/movete-scraper
          path: movete-scraper

      - name: Checkout movete-espectaculos
        uses: actions/checkout@v4
        with:
          repository: serfalco/movete-espectaculos
          path: movete-espectaculos

      - name: Checkout movete-cine
        uses: actions/checkout@v4
        with:
          repository: serfalco/movete-cine
          path: movete-cine

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias de En vivo
        working-directory: movete-scraper
        run: pip install -r requirements.txt

      - name: Instalar dependencias de Cine
        working-directory: movete-cine
        run: pip install -r requirements.txt

      - name: Generar eventos.json
        working-directory: movete-scraper
        env:
          SALIDA_JSON: ../movete-espectaculos/eventos.json
          MOVETE_CACHE_DIR: ../Movete-info/data/scraper-cache
        run: python main.py

      - name: Generar En vivo
        working-directory: movete-espectaculos
        run: python generar_edicion.py --eventos eventos.json --output ../Movete-info/en-vivo

      - name: Generar Cine
        working-directory: movete-cine
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          MOVETE_CINE_OUT: ../Movete-info/cine
        run: python main.py

      - name: Actualizar fecha de portada
        working-directory: Movete-info
        run: python actualizar_portada.py

      - name: Commit unico en Movete-info
        working-directory: Movete-info
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "Sin cambios para publicar" || git commit -m "Publicar edicion semanal MoVeTe"
          git push
