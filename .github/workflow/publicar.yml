name: Publicar MoVeTe

on:
  schedule:
    # Jueves 07:00 Argentina (10:00 UTC)
    - cron: '0 10 * * 4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sitio final
        uses: actions/checkout@v4
        with:
          path: site

      - name: Checkout scraper
        uses: actions/checkout@v4
        with:
          repository: serfalco/movete-scraper
          path: movete-scraper

      - name: Checkout espectáculos
        uses: actions/checkout@v4
        with:
          repository: serfalco/movete-espectaculos
          path: movete-espectaculos

      - name: Checkout cine
        uses: actions/checkout@v4
        with:
          repository: serfalco/movete-cine
          path: movete-cine

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r movete-scraper/requirements.txt
          pip install -r movete-cine/requirements.txt

      - name: Generar eventos.json
        working-directory: movete-scraper
        run: python main.py --output ../eventos.json

      - name: Generar En Vivo
        working-directory: movete-espectaculos
        run: python generar_edicion.py --eventos ../eventos.json --output ../site/en-vivo

      - name: Generar Cine
        working-directory: movete-cine
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python main.py --output ../site/cine

      - name: Generar sitemap
        working-directory: site
        run: python scripts/build_sitemap.py

      - name: Commit cambios
        working-directory: site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "Sin cambios para publicar."
          else
            git commit -m "Publicar edición semanal MoVeTe"
            git push
          fi
